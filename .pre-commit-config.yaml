repos:
  - repo: local
    hooks:
      - id: requirements.txt
        name: Create requirements.txt
        entry: "python scripts/poetry_to_requirements.py"
        language: system
        types: [python]
        pass_filenames: false

      - id: black
        name: Black code format check
        entry: "poetry run black"
        args: ["--check", "--diff", "-tpy312"]
        language: system
        types: [python]
        pass_filenames: true

      - id: ruff
        name: Ruff lint check
        entry: "poetry run ruff"
        args: ["check"]
        language: system
        types: [python]
        pass_filenames: true

      - id: pytest
        name: Run Pytest
        entry: "poetry run pytest"
        args: ["--maxfail=1", "--disable-warnings"]
        language: system
        types: [python]
        pass_filenames: false
