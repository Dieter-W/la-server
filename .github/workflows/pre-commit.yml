name: pre-commit

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    services:
      mariadb:
        image: mariadb:11.4
        env:
          MARIADB_ROOT_PASSWORD: ci-secret
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mariadb-admin ping -h 127.0.0.1 -uroot -pci-secret --silent"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20
    env:
      MARIADB_HOST: localhost
      MARIADB_PORT: "3306"
      MARIADB_USER: root
      MARIADB_PASSWORD: ci-secret
    steps:
      - uses: actions/checkout@v6

      - name: Create .env file
        run: cp .env.example .env

      - name: Set environment values
        run: sed -i 's/MARIADB_PASSWORD=.*/MARIADB_PASSWORD=ci-secret/' .env

      - uses: actions/setup-python@v6
        with:
          python-version-file: pyproject.toml

      - name: Install Poetry
        run: python -m pip install --upgrade pip poetry

      - name: Install Poetry export plugin
        run: poetry self add poetry-plugin-export

      - name: Install dependencies
        run: poetry install --with dev

      - name: Run pre-commit
        run: poetry run pre-commit run --all-files
